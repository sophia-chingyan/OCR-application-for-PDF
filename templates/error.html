<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanLens — {{ title }}</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08080c; --surface: #101017; --border: #25253a;
    --text: #eaeaf3; --text-dim: #6e6e8a;
    --danger: #f87171; --danger-soft: rgba(248,113,113,0.10);
    --accent: #5b7fff;
  }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
         min-height: 100vh; display: flex; align-items: center; justify-content: center;
         padding: 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: 16px; padding: 2.5rem; max-width: 440px; width: 100%;
          text-align: center; }
  .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  h1 { font-size: 20px; margin-bottom: 0.75rem; }
  p { font-size: 13px; color: var(--text-dim); line-height: 1.7; margin-bottom: 1.5rem; }
  p strong { color: var(--text); }
  .btn { display: inline-flex; align-items: center; gap: 6px;
         padding: 10px 22px; border: none; border-radius: 10px;
         background: var(--accent); color: white; font-family: 'Outfit', sans-serif;
         font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
         transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">⛔</div>
    <h1>{{ title }}</h1>
    <p>{{ message | safe }}</p>
    <a class="btn" href="/auth/login">Try Again</a>
  </div>
</body>
</html>
